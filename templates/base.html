<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}AI Cyber Threat Detection Framework{% endblock %}</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;650;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block head %}{% endblock %}
</head>
<body>

<div class="ambient"><div class="radar-sweep"></div></div>

<div class="shell">

  <nav class="navbar">
    <div class="brand">
    <img src="{{ url_for('static', filename='images/logo.png') }}"
         alt="SentinelX Logo"
         class="brand-logo">

    <div class="brand-text">
        <span class="brand-title">SentinelX</span>
        <span class="brand-subtitle">Powered by TriXiE AI</span>
    </div>
    </div>
    <div class="nav-right">
      <div class="nav-pill"><span class="dot"></span>AI Engine Ready</div>
      <a class="gh-link" href="https://github.com/BuildWith-AXAT" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.73.5.9 5.34.9 11.6c0 5 3.24 9.24 7.75 10.74.57.1.78-.25.78-.55v-2.03c-3.15.69-3.81-1.35-3.81-1.35-.52-1.31-1.26-1.66-1.26-1.66-1.03-.7.08-.69.08-.69 1.14.08 1.74 1.17 1.74 1.17 1.01 1.74 2.65 1.24 3.3.95.1-.73.4-1.24.72-1.53-2.51-.28-5.15-1.26-5.15-5.6 0-1.24.44-2.25 1.17-3.05-.12-.29-.5-1.44.11-3 0 0 .96-.31 3.14 1.17a10.9 10.9 0 0 1 5.72 0c2.18-1.48 3.14-1.17 3.14-1.17.62 1.56.23 2.71.11 3 .73.8 1.17 1.81 1.17 3.05 0 4.35-2.65 5.31-5.17 5.59.41.35.77 1.04.77 2.1v3.11c0 .3.2.66.79.55A11.1 11.1 0 0 0 23.1 11.6C23.1 5.34 18.27.5 12 .5Z"/></svg>
        GitHub
      </a>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="footer">
    <span>Designed & Developed by <strong style="color:var(--text-dim);">AXAT</strong> &middot; SentinelX v2.0</span>
    <div class="footer-links">
      <a href="https://github.com/BuildWith-AXAT" target="_blank" rel="noopener">GitHub</a>
      <span>Random Forest &middot; CICIDS2017</span>
    </div>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
